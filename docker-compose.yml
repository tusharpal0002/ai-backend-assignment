version: '3.9'

services:

  backend:
    build: .
    container_name: fastapi_backend
    restart: always

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: appdb

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: redis_cache

    restart: always

  nginx:
    image: nginx:latest

    container_name: nginx_proxy

    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

volumes:
  postgres_data:


  